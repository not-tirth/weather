<!doctype html>
<html>
  <head>
    <title>document</title>
    <style>
      body {
        font-family: Arial;
        text-align: center;
        background: linear-gradient(to right, #09527f, #9face6);
        margin: 0;
        padding: 20px;
      }

      h1 {
        color: #fff;
      }

      #container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 20px;
        margin-top: 20px;
      }

      .card {
        background: white;
        padding: 20px;
        border-radius: 12px;
        width: 220px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
      }

      .card:hover {
        transform: translateY(-5px);
      }

      h3 {
        margin: 10px 0;
      }

      p {
        margin: 5px 0;
        font-size: 14px;
      }
    </style>
  </head>

  <body>
    <div id="container"></div>

    <script>
      const cities = [
        { name: "Ahmedabad", lat: 23.03, lon: 72.58 },
        { name: "Delhi", lat: 28.61, lon: 77.2 },
        { name: "Mumbai", lat: 19.07, lon: 72.87 },
      ];

      async function getWeather() {
        const container = document.getElementById("container");

        const results = await Promise.all(
          cities.map((city) =>
            fetch(
              `https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&current_weather=true`,
            )
              .then((res) => res.json())
              .then((data) => ({
                name: city.name,
                weather: data.current_weather,
              })),
          ),
        );

        container.innerHTML = results
          .map(
            (city) => `
      <div class="card">
        <h3>📍 ${city.name}</h3>
        <p>🌡 Temp: <b>${city.weather.temperature}°C</b></p>
        <p>💨 Wind: ${city.weather.windspeed} km/h</p>
        <p>⏱ ${city.weather.time}</p>
      </div>
    `,
          )
          .join("");
      }

      getWeather();
    </script>
  </body>
</html>
